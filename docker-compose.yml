services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speed-to-lead-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATA_DIR: /app/data
      REDIS_URL: redis://redis:6379
      WORKER_ENABLED: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: speed-to-lead-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
